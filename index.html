<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FrostSMP Loja</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0f1a;
    color: white;
}

/* MENU */
nav {
    display: flex;
    justify-content: center;
    padding: 15px;
}

nav button {
    background: none;
    border: none;
    color: white;
    margin: 10px;
    cursor: pointer;
}

/* SEÇÕES */
.section {
    display: none;
    padding: 20px;
}

.active {
    display: block;
}

/* CARDS */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

.card {
    background: #111827;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
}

/* BOTÃO */
.btn {
    margin-top: 10px;
    padding: 10px;
    background: #22c1c3;
    color: black;
    border-radius: 8px;
    cursor: pointer;
}

/* POPUP */
.popup {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
}

.popup-box {
    background: #111827;
    padding: 20px;
    margin: 100px auto;
    width: 300px;
    border-radius: 10px;
    text-align: center;
}
</style>
</head>

<body>

<h1 style="text-align:center;">❄️ FrostSMP Loja ❄️</h1>

<nav>
    <button onclick="trocarAba('vips')">VIPs</button>
    <button onclick="trocarAba('kits')">Kits</button>
    <button onclick="trocarAba('coins')">Coins</button>
</nav>

<!-- VIP -->
<div id="vips" class="section active">
    <div class="container">
        <div class="card">
            <h3>VIP Frost</h3>
            <p>R$10</p>
            <div class="btn" onclick="abrirPagamento('VIP Frost',10)">Comprar</div>
        </div>
    </div>
</div>

<!-- KITS -->
<div id="kits" class="section">
    <div class="container">
        <div class="card">
            <h3>Kit Inicial</h3>
            <p>R$7</p>
            <div class="btn" onclick="abrirPagamento('Kit Inicial',7)">Comprar</div>
        </div>
    </div>
</div>

<!-- COINS -->
<div id="coins" class="section">
    <div class="container">
        <div class="card">
            <h3>1000 Coins</h3>
            <p>R$5</p>
            <div class="btn" onclick="abrirPagamento('Coins',5)">Comprar</div>
        </div>
    </div>
</div>

<!-- PAGAMENTO -->
<div id="pagamento" class="popup">
    <div class="popup-box">
        <h3 id="produto"></h3>
        <p id="preco"></p>

        <button onclick="pix()">Pix</button>
        <button onclick="cartao()">Cartão</button>

        <p id="info"></p>

        <button onclick="fecharPagamento()">Fechar</button>
    </div>
</div>

<script>
function trocarAba(aba) {
    document.querySelectorAll('.section').forEach(s => s.style.display = "none");
    document.getElementById(aba).style.display = "block";
}

function abrirPagamento(nome, valor) {
    document.getElementById("pagamento").style.display = "block";
    document.getElementById("produto").innerText = nome;
    document.getElementById("preco").innerText = "R$" + valor;
}

function fecharPagamento() {
    document.getElementById("pagamento").style.display = "none";
}

function pix() {
    document.getElementById("info").innerText = "Chave Pix: SUA-CHAVE-AQUI";
}

function cartao() {
    document.getElementById("info").innerText = "Use um link do Mercado Pago";
}
</script>

</body>
</html>
